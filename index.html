<style>
:root{
  --primary:#cc3300;--secondary:#ff9933;--accent:#ffcc00;
  --dark:#4d1a00;--bg:#fff8f0;--card:#fff;--text:#2d1500;
  --shadow:0 4px 18px rgba(204,51,0,.12);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:linear-gradient(180deg,#fff8f0,#fff1e0);color:var(--text);line-height:1.6;}
header{background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff;padding:16px;text-align:center;box-shadow:var(--shadow);position:sticky;top:0;z-index:100;}
header h1{font-size:1.7rem;letter-spacing:1px;}
header .om{font-size:1.9rem;display:block;}
header .region{font-size:.9rem;opacity:.9;margin-top:4px;}
.lang-bar{display:flex;flex-wrap:wrap;justify-content:center;gap:5px;background:var(--dark);padding:10px;}
.lang-bar a{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.25);padding:5px 11px;border-radius:18px;cursor:pointer;font-size:.82rem;text-decoration:none;transition:.2s;}
.lang-bar a:hover,.lang-bar a.active{background:var(--accent);color:var(--dark);font-weight:bold;}
nav{display:flex;justify-content:center;gap:4px;flex-wrap:wrap;background:var(--card);padding:10px;box-shadow:var(--shadow);position:sticky;top:62px;z-index:90;}
nav a{background:none;border:none;padding:9px 16px;cursor:pointer;font-size:.98rem;font-weight:600;color:var(--primary);border-radius:8px;transition:.2s;text-decoration:none;}
nav a:hover,nav a.active{background:var(--secondary);color:#fff;}
.container{max-width:1100px;margin:24px auto;padding:0 16px;}
.page{display:none;animation:fade .4s;}
.page.active{display:block;}
@keyframes fade{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
.card{background:var(--card);border-radius:16px;padding:22px;margin-bottom:20px;box-shadow:var(--shadow);border-top:4px solid var(--secondary);}
.card h2{color:var(--primary);margin-bottom:14px;display:flex;align-items:center;gap:8px;font-size:1.3rem;}
.panchang-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;}
.pitem{background:linear-gradient(135deg,#fff,#fff4e6);border-radius:12px;padding:14px;border-left:4px solid var(--accent);}
.pitem .label{font-size:.78rem;color:#a05000;text-transform:uppercase;letter-spacing:.5px;}
.pitem .value{font-size:1.15rem;font-weight:bold;color:var(--dark);margin-top:4px;}
.date-display{text-align:center;font-size:1.3rem;color:var(--primary);font-weight:bold;margin-bottom:8px;}
.bangla-date{text-align:center;font-size:1.05rem;color:var(--dark);background:#fff4e6;border-radius:10px;padding:8px;margin-bottom:12px;}
.cal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.cal-header button{font-size:1.5rem;background:var(--secondary);color:#fff;border:none;width:40px;height:40px;border-radius:50%;cursor:pointer;}
.cal-title{font-size:1.3rem;font-weight:bold;color:var(--primary);}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.cal-day-name{text-align:center;font-weight:bold;color:var(--primary);padding:8px 0;font-size:.9rem;}
.cal-cell{background:#fff;border-radius:10px;min-height:78px;padding:6px;border:1px solid #ffe0c0;cursor:pointer;transition:.2s;}
.cal-cell:hover{background:#fff4e6;transform:scale(1.03);}
.cal-cell.empty{background:transparent;border:none;}
.cal-cell.today{border:2px solid var(--primary);background:#fff0e0;}
.cal-cell .num{font-weight:bold;font-size:1.05rem;}
.cal-cell .tithi{font-size:.68rem;color:#a05000;margin-top:2px;}
.cal-cell .fest{font-size:.62rem;color:var(--primary);font-weight:bold;}
.mantra{background:linear-gradient(135deg,#fff8f0,#ffeccc);border-radius:14px;padding:20px;margin-bottom:16px;border-left:5px solid var(--primary);}
.mantra .sanskrit{font-size:1.25rem;color:var(--dark);font-weight:bold;margin-bottom:8px;line-height:1.8;}
.mantra .meaning{font-style:italic;color:#5a3000;}
.mantra .title{color:var(--primary);font-weight:bold;margin-bottom:6px;font-size:1.1rem;}
footer{background:var(--dark);color:#ffcc99;text-align:center;padding:24px 16px;margin-top:30px;}
footer .om{font-size:1.6rem;color:var(--accent);}
@media(max-width:600px){header h1{font-size:1.3rem;}nav a{padding:8px 11px;font-size:.88rem;}}
</style>

  <section class="page" id="page-hindu">

  </section>

  <section class="page" id="page-mantra">

</div>

<footer>

/* ---------- ASTRONOMY (approx, region-aware via longitude) ---------- */
const SYNODIC=29.530588853;
const REF_NEWMOON=Date.UTC(2000,0,6,18,14)/86400000;
const SIDEREAL=27.321661;
function julianDays(d){return d.getTime()/86400000;}
function computePanchang(date){
  const jd=julianDays(date);
  const moonAge=((jd-REF_NEWMOON)%SYNODIC+SYNODIC)%SYNODIC;
  const tithiNum=Math.floor(moonAge/(SYNODIC/30));
  const paksha=tithiNum<15?0:1;
  const tithiInPaksha=tithiNum%15;
  const nakAge=((jd-REF_NEWMOON)%SIDEREAL+SIDEREAL)%SIDEREAL;
  const nak=Math.floor(nakAge/(SIDEREAL/27))%27;
  const yoga=Math.floor((jd*1.07)%27+27)%27;
  const karan=tithiNum%11;
  const vaar=date.getDay();
  const maah=date.getMonth()%12;
  const ritu=Math.floor(date.getMonth()/2)%6;
  return {tithiNum,tithiInPaksha,paksha,nak,yoga,karan,vaar,maah,ritu};
}
function sunTimesRaw(date,lon){
  const day=Math.floor((date-new Date(date.getFullYear(),0,0))/86400000);
  const decl=23.45*Math.sin((360/365)*(day-81)*Math.PI/180);
  const lat=22.0;
  const ha=Math.acos(-Math.tan(lat*Math.PI/180)*Math.tan(decl*Math.PI/180))*180/Math.PI;
  // IST based on 82.5E; adjust solar noon by local longitude
  const noon=12.0+(82.5-lon)*4/60;
  return {sunrise:noon-ha/15,sunset:noon+ha/15};
}
function fmtTime(h){h=(h+24)%24;let hh=Math.floor(h),mm=Math.floor((h-hh)*60),ap=hh<12?"AM":"PM",h12=hh%12||12;return `${h12}:${mm<10?'0':''}${mm} ${ap}`;}
function sunTimes(date,lon){const r=sunTimesRaw(date,lon);const p=computePanchang(date);return {sunrise:fmtTime(r.sunrise),sunset:fmtTime(r.sunset),moonrise:fmtTime((r.sunrise+p.tithiNum*0.8)%24)};}
const RAHU_SEQ=[8,2,7,5,6,4,3],GULIK_SEQ=[7,6,5,4,3,2,1],YAM_SEQ=[5,4,3,2,1,7,6];
function periodFromSeq(date,seqIdx,lon){const r=sunTimesRaw(date,lon);const seg=(r.sunset-r.sunrise)/8;const start=r.sunrise+(seqIdx-1)*seg;return `${fmtTime(start)} – ${fmtTime(start+seg)}`;}

/* ---------- BENGALI CALENDAR DATE (Bangabda) ---------- */
const BANGLA_MONTHS=["বৈশাখ","জ্যৈষ্ঠ","আষাঢ়","শ্রাবণ","ভাদ্র","আশ্বিন","কার্তিক","অগ্রহায়ণ","পৌষ","মাঘ","ফাল্গুন","চৈত্র"];
// Bangla month start dates (Gregorian, revised Bangladesh-style fixed reckoning approx for display)
const BANGLA_START=[[3,14],[4,14],[5,15],[6,16],[7,16],[8,16],[9,17],[10,16],[11,15],[0,14],[1,13],[2,15]];
function toBanglaDigits(n){return String(n).replace(/[0-9]/g,d=>"০১২৩৪৫৬৭৮৯"[d]);}
function banglaDate(date){
  const y=date.getFullYear();let mIdx=0,startD;
  for(let i=BANGLA_MONTHS.length-1;i>=0;i--){
    const[mm,dd]=BANGLA_START[i];
    const s=new Date(y,mm,dd);
    if(date>=s){mIdx=i;startD=s;break;}
  }
  if(startD===undefined){const[mm,dd]=BANGLA_START[11];startD=new Date(y-1,mm,dd);mIdx=11;}
  const dayNum=Math.floor((date-startD)/86400000)+1;
  // Bangabda year = Gregorian - 593 (approx, after Poila Boishakh)
  let bYear=y-593; if(date<new Date(y,3,14))bYear=y-594;
  return `${toBanglaDigits(dayNum)} ${BANGLA_MONTHS[mIdx]} ${toBanglaDigits(bYear)} বঙ্গাব্দ`;
}

/* ============================================================
   STATE + ROUTER (hash based: #lang  or  #lang/page)
   ============================================================ */
let currentLang="hi";
let currentPage="daily";
let calDate=new Date();
const PAGES=["daily","monthly","hindu","mantra"];

function parseHash(){
  const h=location.hash.replace(/^#/,"");
  const [l,p]=h.split("/");
  if(l && LANGS[l])currentLang=l;
  if(p && PAGES.includes(p))currentPage=p; else currentPage="daily";
}
function setHash(){location.hash=currentLang+"/"+currentPage;}

function buildLangBar(){
  const bar=document.getElementById("langBar");bar.innerHTML="";
  Object.keys(LANGS).forEach(code=>{
    const a=document.createElement("a");
    a.textContent=LANGS[code].name;
    a.href="#"+code+"/"+currentPage;
    if(code===currentLang)a.classList.add("active");
    bar.appendChild(a);
  });
}
function buildNav(){
  const nav=document.getElementById("mainNav");nav.innerHTML="";
  const U=ui(currentLang);
  PAGES.forEach(p=>{
    const a=document.createElement("a");
    a.textContent=U.nav[p];a.href="#"+currentLang+"/"+p;
    if(p===currentPage)a.classList.add("active");
    nav.appendChild(a);
  });
}
function showPage(){
  document.querySelectorAll(".page").forEach(s=>s.classList.remove("active"));
  document.getElementById("page-"+currentPage).classList.add("active");
}

function item(label,value){return `<div class="pitem"><div class="label">${label}</div><div class="value">${value}</div></div>`;}

function renderDaily(){
  const lang=currentLang,U=ui(lang),L=U.labels,rc=REGION_CALC[lang]||REGION_CALC.hi;
  const now=new Date();const p=computePanchang(now);const st=sunTimes(now,rc.lon);
  const vaar=(VAAR[lang]||VAAR.default)[p.vaar];
  document.getElementById("todayDate").textContent=
    now.getDate()+" / "+(now.getMonth()+1)+" / "+now.getFullYear()+" • "+vaar;
  // regional date row (Bengali Bangla date highlighted)
  const rd=document.getElementById("regionalDate");
  if(lang==="bn"){rd.style.display="block";rd.textContent="📿 "+banglaDate(now);}
  else{rd.style.display="block";rd.textContent=L.samvat+": "+(now.getFullYear()+rc.eraAdd)+" • "+LANGS[lang].era;}
  document.getElementById("dailyGrid").innerHTML=
    item(L.tithi,S(PAKSHA,lang)[p.paksha]+" "+S(TITHI,lang)[p.tithiInPaksha])+
    item(L.vaar,vaar)+
    item(L.nakshatra,S(NAKSHATRA,lang)[p.nak])+
    item(L.yoga,S(YOGA,lang)[p.yoga]||YOGA.deva[p.yoga])+
    item(L.karan,S(KARAN,lang)[p.karan]||KARAN.deva[p.karan])+
    item(L.paksha,S(PAKSHA,lang)[p.paksha])+
    item(L.maah,S(MAAH,lang)[p.maah]||MAAH.deva[p.maah])+
    item(L.ritu,S(RITU,lang)[p.ritu]||RITU.deva[p.ritu])+
    item(L.samvat,(now.getFullYear()+rc.eraAdd))+
    item(L.sunrise,st.sunrise)+item(L.sunset,st.sunset)+item(L.moonrise,st.moonrise);
  document.getElementById("muhuratGrid").innerHTML=
    item(L.rahukaal,periodFromSeq(now,RAHU_SEQ[p.vaar],rc.lon))+
    item(L.gulika,periodFromSeq(now,GULIK_SEQ[p.vaar],rc.lon))+
    item(L.yamghant,periodFromSeq(now,YAM_SEQ[p.vaar],rc.lon))+
    item(L.abhijit,"11:48 AM – 12:36 PM")+
    item(L.amrit,"05:30 AM – 07:00 AM");
}

function renderCalendar(){
  const lang=currentLang;
  const y=calDate.getFullYear(),mo=calDate.getMonth();
  document.getElementById("calTitle").textContent=
    new Intl.DateTimeFormat("en-IN",{month:"long",year:"numeric"}).format(calDate);
  const cal=document.getElementById("calendar");cal.innerHTML="";
  const dn=(VAAR[lang]||VAAR.default).map(d=>d.slice(0,2));
  dn.forEach(d=>{const e=document.createElement("div");e.className="cal-day-name";e.textContent=d;cal.appendChild(e);});
  const first=new Date(y,mo,1).getDay(),dim=new Date(y,mo+1,0).getDate(),today=new Date();
  for(let i=0;i<first;i++){const e=document.createElement("div");e.className="cal-cell empty";cal.appendChild(e);}
  for(let d=1;d<=dim;d++){
    const cell=document.createElement("div");cell.className="cal-cell";
    const cd=new Date(y,mo,d);const p=computePanchang(cd);const fest=festOf(cd,lang);
    if(d===today.getDate()&&mo===today.getMonth()&&y===today.getFullYear())cell.classList.add("today");
    cell.innerHTML=`<div class="num">${d}</div><div class="tithi">${S(TITHI,lang)[p.tithiInPaksha]}</div>${fest?`<div class="fest">${fest}</div>`:""}`;
    cell.onclick=()=>showDayDetail(cd);
    cal.appendChild(cell);
  }
}
function changeMonth(delta){calDate.setMonth(calDate.getMonth()+delta);renderCalendar();}
function showDayDetail(date){
  const lang=currentLang,U=ui(lang),L=U.labels,rc=REGION_CALC[lang]||REGION_CALC.hi;
  const p=computePanchang(date);const st=sunTimes(date,rc.lon);
  document.getElementById("dayDetailCard").style.display="block";
  document.getElementById("dayDetailGrid").innerHTML=
    item("📆",date.getDate()+" / "+(date.getMonth()+1)+" / "+date.getFullYear())+
    (lang==="bn"?item("📿",banglaDate(date)):"")+
    item(L.vaar,(VAAR[lang]||VAAR.default)[p.vaar])+
    item(L.tithi,S(PAKSHA,lang)[p.paksha]+" "+S(TITHI,lang)[p.tithiInPaksha])+
    item(L.nakshatra,S(NAKSHATRA,lang)[p.nak])+
    item(L.yoga,S(YOGA,lang)[p.yoga]||YOGA.deva[p.yoga])+
    item(L.karan,S(KARAN,lang)[p.karan]||KARAN.deva[p.karan])+
    item(L.sunrise,st.sunrise)+item(L.sunset,st.sunset);
  document.getElementById("dayDetailCard").scrollIntoView({behavior:"smooth"});
}
function renderHindu(){
  const data=HINDU_INFO[currentLang]||HINDU_INFO.en;
  document.getElementById("hinduContent").innerHTML=
    data.map(x=>`<div class="mantra"><div class="title">${x.t}</div><div class="meaning">${x.d}</div></div>`).join("");
}
function renderMantra(){
  const lang=currentLang;
  document.getElementById("mantraContent").innerHTML=MANTRAS.map(m=>{
    const title=m.title[lang]||m.title.en||m.title.hi;
    const meaning=m.meaning[lang]||m.meaning.en||m.meaning.hi;
    return `<div class="mantra"><div class="title">${title}</div><div class="sanskrit">${m.sanskrit}</div><div class="meaning">${meaning}</div></div>`;
  }).join("");
}
function applyText(){
  const U=ui(currentLang);
  document.documentElement.lang=currentLang;
  document.documentElement.dir=["ur","ks","sd"].includes(currentLang)?"rtl":"ltr";
  document.getElementById("siteTitle").textContent=U.site;
  document.getElementById("regionLabel").textContent="📍 "+LANGS[currentLang].region;
  document.getElementById("footerText").textContent=U.footerText;
  document.getElementById("t-dailyTitle").textContent=U.dailyTitle;
  document.getElementById("t-monthlyTitle").textContent=U.monthlyTitle;
  document.getElementById("t-hinduTitle").textContent=U.hinduTitle;
  document.getElementById("t-mantraTitle").textContent=U.mantraTitle;
  document.getElementById("t-muhuratTitle").textContent=U.muhuratTitle;
  document.getElementById("t-dayDetail").textContent=U.dayDetail;
}
function renderAll(){
  parseHash();
  buildLangBar();buildNav();applyText();showPage();
  renderDaily();renderCalendar();renderHindu();renderMantra();
  document.getElementById("dayDetailCard").style.display="none";
}
window.addEventListener("hashchange",renderAll);
window.addEventListener("DOMContentLoaded",()=>{
  if(!location.hash){location.hash="hi/daily";}
  renderAll();
});
renderAll();
</script>
