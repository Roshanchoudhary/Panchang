<!DOCTYPE html>
<html>
<head>
    <title>आज का पंचांग</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- यहाँ CSS (स्टाइल) आएगा -->
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f8f0e3; text-align: center; padding: 20px; }
        .card { background: white; max-width: 500px; margin: auto; padding: 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        h1 { color: #b8860b; }
        .detail { font-size: 1.2em; border-bottom: 1px solid #ddd; padding: 10px 0; }
        .label { font-weight: bold; color: #555; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🕉️ आज का पंचांग</h1>
        <div id="panchang-data">
            <p>⏳ लोड हो रहा है... कृपया थोड़ी देर प्रतीक्षा करें</p>
        </div>
    </div>

    <!-- यहाँ JavaScript (पंचांग कैलकुलेशन) आएगा -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.1/moment.min.js"></script>
    <script>
        // सबसे आसान तरीका: एक फ्री API का उपयोग करें (क्योंकि drik-panchang थोड़ा जटिल है)
        async function getPanchang() {
            try {
                // यह एक निःशुल्क API है (यह दिल्ली के लिए डेटा देगा)
                const response = await fetch('https://api.prokerala.com/v2/astronomy/panchang?datetime=now&ayanamsa=1&coordinates=28.6139,77.2090');
                const data = await response.json();
                
                // डेटा को HTML में दिखाएँ
                document.getElementById('panchang-data').innerHTML = `
                    <div class="detail"><span class="label">🗓️ तिथि:</span> ${data.data.tithi.name}</div>
                    <div class="detail"><span class="label">⭐ नक्षत्र:</span> ${data.data.nakshatra.name}</div>
                    <div class="detail"><span class="label">📅 वार:</span> ${data.data.weekday}</div>
                    <div class="detail"><span class="label">🌞 सूर्योदय:</span> ${data.data.sunrise}</div>
                    <div class="detail"><span class="label">🌙 सूर्यास्त:</span> ${data.data.sunset}</div>
                    <div class="detail"><span class="label">☀️ राशि:</span> ${data.data.moon_sign.name}</div>
                `;
            } catch (error) {
                document.getElementById('panchang-data').innerHTML = `
                    <p style="color:red;">❌ डेटा लोड करने में समस्या आई। कृपया बाद में प्रयास करें।</p>
                    <p>अगर आपको यह एरर दिखे, तो मुझे बताएँ, मैं दूसरा तरीका बताऊँगा।</p>
                `;
                console.error("Error:", error);
            }
        }
        
        // जब पेज लोड हो, तो पंचांग लाएँ
        getPanchang();
    </script>
</body>
</html>
