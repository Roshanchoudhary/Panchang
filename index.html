<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>भारतीय पंचांग | Indian Panchang</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<header><span class="om">🕉️</span><h1>भारतीय पंचांग · Indian Panchang</h1>
<div class="region">22 राजभाषाओं में · सटीक ज्योतिषीय गणना</div></header>
<div class="container">
  <div class="card">
    <h2 id="chooseTitle">अपनी भाषा चुनें · Choose your language</h2>
    <div class="home-grid" id="langGrid"></div>
  </div>
</div>
<footer><div class="om">🕉️</div><p>© 2026 भारतीय पंचांग</p></footer>

<!-- load all i18n files -->
<script src="js/i18n/hi.js"></script>
<script src="js/i18n/bn.js"></script>
<script src="js/i18n/ta.js"></script>
<!-- add: te.js, ml.js, kn.js, mr.js, gu.js, pa.js, or.js, as.js, mai.js, ne.js, kok.js, doi.js, brx.js, sa.js, sat.js, mni.js, ks.js, sd.js, ur.js -->
<script>
const ORDER=["as","bn","brx","doi","gu","hi","kn","ks","kok","mai","ml","mni","mr","ne","or","pa","sa","sat","sd","ta","te","ur"];
const grid=document.getElementById("langGrid");
grid.innerHTML=ORDER.filter(c=>window.I18N&&window.I18N[c]).map(c=>{
  const L=window.I18N[c];
  return `<a class="lang-card" href="daily.html?lang=${c}">
    <div class="native">${L.meta.name}</div>
    <div class="region">📍 ${L.meta.region}</div></a>`;
}).join("");
</script>
</body>
</html>
