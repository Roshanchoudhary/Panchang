<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="google-adsense-account" content="ca-pub-8853644358447210">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#c1272d">
<title>भारतीय पंचांग | Indian Panchang</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans','Segoe UI',system-ui,sans-serif;background:linear-gradient(180deg,#fff8f0,#fff1e0);color:#2d1500;line-height:1.6;min-height:100vh;-webkit-text-size-adjust:100%;}
.hero{background:linear-gradient(135deg,#c1272d,#f7931e);color:#fff;padding:26px 16px;text-align:center;}
.hero .om{font-size:2.4rem;display:block;line-height:1;}
.hero h1{font-size:clamp(1.2rem,5vw,2rem);margin-top:8px;}
.hero .tagline{font-size:clamp(.78rem,3vw,1rem);opacity:.95;margin-top:8px;}
.wrap{max-width:1100px;margin:0 auto;padding:22px 14px;}
.title{text-align:center;color:#c1272d;font-size:clamp(1.05rem,4vw,1.4rem);font-weight:700;margin-bottom:16px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;}
@media(max-width:380px){.grid{grid-template-columns:repeat(2,1fr);gap:10px;}}
.card{background:#fff;border-radius:16px;padding:18px 12px;text-align:center;box-shadow:0 3px 14px rgba(193,39,45,.12);border-top:4px solid #f7931e;text-decoration:none;color:inherit;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:110px;}
.card:active{transform:scale(.97);}
.card .native{font-size:1.35rem;font-weight:700;color:#c1272d;word-break:break-word;}
.card .english{font-size:.8rem;color:#8a5a30;margin-top:4px;}
.foot{background:#4d1a00;color:#ffcc99;text-align:center;padding:22px 16px;margin-top:26px;}
.foot .om{font-size:1.4rem;color:#ffc20e;}
#diag{background:#fff3cd;color:#8a5a30;padding:12px 16px;font-size:.85rem;line-height:1.8;margin:14px;border-radius:10px;display:none;}
</style>
</head>
<body>

<header class="hero">
  <span class="om">🕉️</span>
  <h1>भारतीय पंचांग · Indian Panchang</h1>
  <div class="tagline">22 राजभाषाओं में · सटीक ज्योतिषीय गणना</div>
</header>

<div id="diag"></div>

<main class="wrap">
  <div class="title">अपनी भाषा चुनें · Choose Your Language</div>
  <div class="grid" id="langGrid"></div>
</main>

<footer class="foot">
  <div class="om">🕉️</div>
  <p>© 2026 भारतीय पंचांग · Indian Panchang</p>
</footer>

<!-- ===== ALL 22 i18n files (lowercase names) ===== -->
<script src="js/i18n/as.js"></script>
<script src="js/i18n/bn.js"></script>
<script src="js/i18n/brx.js"></script>
<script src="js/i18n/doi.js"></script>
<script src="js/i18n/gu.js"></script>
<script src="js/i18n/hi.js"></script>
<script src="js/i18n/kn.js"></script>
<script src="js/i18n/ks.js"></script>
<script src="js/i18n/kok.js"></script>
<script src="js/i18n/mai.js"></script>
<script src="js/i18n/ml.js"></script>
<script src="js/i18n/mni.js"></script>
<script src="js/i18n/mr.js"></script>
<script src="js/i18n/ne.js"></script>
<script src="js/i18n/or.js"></script>
<script src="js/i18n/pa.js"></script>
<script src="js/i18n/sa.js"></script>
<script src="js/i18n/sat.js"></script>
<script src="js/i18n/sd.js"></script>
<script src="js/i18n/ta.js"></script>
<script src="js/i18n/te.js"></script>
<script src="js/i18n/ur.js"></script>

<script>
var ORDER = ["as","bn","brx","doi","gu","hi","kn","ks","kok","mai","ml","mni","mr","ne","or","pa","sa","sat","sd","ta","te","ur"];
var ENGLISH_NAMES = {
  as:"Assamese", bn:"Bengali", brx:"Bodo", doi:"Dogri", gu:"Gujarati",
  hi:"Hindi", kn:"Kannada", ks:"Kashmiri", kok:"Konkani", mai:"Maithili",
  ml:"Malayalam", mni:"Manipuri", mr:"Marathi", ne:"Nepali", or:"Odia",
  pa:"Punjabi", sa:"Sanskrit", sat:"Santali", sd:"Sindhi", ta:"Tamil",
  te:"Telugu", ur:"Urdu"
};

var grid = document.getElementById("langGrid");
var available = ORDER.filter(function(c){ return window.I18N && window.I18N[c]; });

// Render whatever loaded
if (available.length) {
  grid.innerHTML = available.map(function(c){
    var L = window.I18N[c];
    var dir = (L.meta && L.meta.dir === "rtl") ? ' dir="rtl"' : '';
    var region = (L.meta && L.meta.name) ? L.meta.name : c;
    return '<a class="card" href="daily.html?lang=' + c + '">' +
             '<div class="native"' + dir + '>' + region + '</div>' +
             '<div class="english">' + (ENGLISH_NAMES[c] || c) + '</div>' +
           '</a>';
  }).join("");
}

// Diagnostic: agar koi file load nahi hui, mobile par hi exact reason dikhao
var missing = ORDER.filter(function(c){ return !(window.I18N && window.I18N[c]); });
if (missing.length) {
  var diag = document.getElementById("diag");
  diag.style.display = "block";
  diag.innerHTML = "⚠️ Load nahi hui: <b>" + missing.join(", ") + "</b><br>Reason check ho raha hai...";
  missing.forEach(function(c){
    fetch("js/i18n/" + c + ".js").then(function(r){
      diag.innerHTML += "<br>" + c + ".js → HTTP " + r.status +
        (r.status === 404 ? " ❌ file nahi mili / naam ka case galat"
                          : " ⚠️ mili par syntax error hai");
    }).catch(function(){ diag.innerHTML += "<br>" + c + ".js → network error"; });
  });
}
</script>
</body>
</html>
