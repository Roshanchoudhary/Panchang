<style>
:root{
  --primary:#cc3300;
  --secondary:#ff9933;
  --accent:#ffcc00;
  --dark:#4d1a00;
  --bg:#fff8f0;
  --card:#ffffff;
  --text:#2d1500;
  --shadow:0 4px 18px rgba(204,51,0,.12);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Segoe UI',Tahoma,sans-serif;
  background:linear-gradient(180deg,#fff8f0,#fff1e0);
  color:var(--text);
  line-height:1.6;
}
header{
  background:linear-gradient(135deg,var(--primary),var(--secondary));
  color:#fff;
  padding:18px 16px;
  text-align:center;
  box-shadow:var(--shadow);
  position:sticky;
  top:0;
  z-index:100;
}
header h1{font-size:1.8rem;letter-spacing:1px;}
header .om{font-size:2rem;display:block;}
.lang-bar{
  display:flex;flex-wrap:wrap;justify-content:center;gap:6px;
  background:var(--dark);padding:10px;
}
.lang-bar button{
  background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.3);
  padding:6px 12px;border-radius:20px;cursor:pointer;font-size:.85rem;transition:.2s;
}
.lang-bar button:hover,.lang-bar button.active{
  background:var(--accent);color:var(--dark);font-weight:bold;
}
nav{
  display:flex;justify-content:center;gap:4px;flex-wrap:wrap;
  background:var(--card);padding:10px;box-shadow:var(--shadow);
  position:sticky;top:64px;z-index:90;
}
nav button{
  background:none;border:none;padding:10px 18px;cursor:pointer;
  font-size:1rem;font-weight:600;color:var(--primary);border-radius:8px;transition:.2s;
}
nav button:hover,nav button.active{background:var(--secondary);color:#fff;}
.container{max-width:1100px;margin:24px auto;padding:0 16px;}
.page{display:none;animation:fade .4s;}
.page.active{display:block;}
@keyframes fade{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
.card{
  background:var(--card);border-radius:16px;padding:22px;margin-bottom:20px;
  box-shadow:var(--shadow);border-top:4px solid var(--secondary);
}
.card h2{color:var(--primary);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.panchang-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;}
.pitem{
  background:linear-gradient(135deg,#fff,#fff4e6);border-radius:12px;padding:14px;
  border-left:4px solid var(--accent);
}
.pitem .label{font-size:.8rem;color:#a05000;text-transform:uppercase;letter-spacing:.5px;}
.pitem .value{font-size:1.2rem;font-weight:bold;color:var(--dark);margin-top:4px;}
.date-display{text-align:center;font-size:1.3rem;color:var(--primary);font-weight:bold;margin-bottom:8px;}
.controls{display:flex;justify-content:center;gap:10px;margin:16px 0;flex-wrap:wrap;}
.controls button,.controls input{
  padding:8px 16px;border:2px solid var(--secondary);border-radius:8px;
  background:#fff;cursor:pointer;font-size:1rem;color:var(--primary);
}
.controls button:hover{background:var(--secondary);color:#fff;}
/* calendar */
.cal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.cal-header button{font-size:1.5rem;background:var(--secondary);color:#fff;border:none;width:40px;height:40px;border-radius:50%;cursor:pointer;}
.cal-title{font-size:1.4rem;font-weight:bold;color:var(--primary);}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.cal-day-name{text-align:center;font-weight:bold;color:var(--primary);padding:8px 0;}
.cal-cell{
  background:#fff;border-radius:10px;min-height:78px;padding:6px;border:1px solid #ffe0c0;
  cursor:pointer;transition:.2s;position:relative;
}
.cal-cell:hover{background:#fff4e6;transform:scale(1.03);}
.cal-cell.empty{background:transparent;border:none;}
.cal-cell.today{border:2px solid var(--primary);background:#fff0e0;}
.cal-cell .num{font-weight:bold;font-size:1.1rem;}
.cal-cell .tithi{font-size:.7rem;color:#a05000;margin-top:2px;}
.cal-cell .fest{font-size:.65rem;color:var(--primary);font-weight:bold;}
/* mantra */
.mantra{
  background:linear-gradient(135deg,#fff8f0,#ffeccc);border-radius:14px;padding:20px;
  margin-bottom:16px;border-left:5px solid var(--primary);
}
.mantra .sanskrit{font-size:1.3rem;color:var(--dark);font-weight:bold;margin-bottom:8px;line-height:1.8;}
.mantra .meaning{font-style:italic;color:#5a3000;}
.mantra .title{color:var(--primary);font-weight:bold;margin-bottom:6px;font-size:1.1rem;}
footer{
  background:var(--dark);color:#ffcc99;text-align:center;padding:24px 16px;margin-top:30px;
}
footer .om{font-size:1.6rem;color:var(--accent);}
@media(max-width:600px){
  header h1{font-size:1.3rem;}
  nav button{padding:8px 12px;font-size:.9rem;}
}
</style>

</div>

/* ---------- 3. ASTRONOMY CALCULATIONS (approx, no library) ---------- */
// Reference new moon: 2000-01-06 18:14 UTC, synodic month 29.530588853 days
const SYNODIC=29.530588853;
const REF_NEWMOON=Date.UTC(2000,0,6,18,14)/86400000;
const SIDEREAL=27.321661;

function julianDays(d){return d.getTime()/86400000;}

// Returns 0-29 (tithi index), 0-26 nakshatra, etc.
function computePanchang(date){
  const jd=julianDays(date);
  const moonAge=((jd-REF_NEWMOON)%SYNODIC+SYNODIC)%SYNODIC; // 0..29.53
  const tithiNum=Math.floor(moonAge/ (SYNODIC/30)); // 0..29
  const paksha=tithiNum<15?0:1;
  const tithiInPaksha=tithiNum%15; // 0..14
  // Nakshatra: moon longitude approx via age fraction of sidereal cycle
  const nakAge=((jd-REF_NEWMOON)%SIDEREAL+SIDEREAL)%SIDEREAL;
  const nak=Math.floor(nakAge/(SIDEREAL/27))%27;
  // Yoga & Karan derived deterministically
  const yoga=Math.floor((jd*1.07)%27+27)%27;
  const karan=tithiNum%11;
  const vaar=date.getDay();
  // Lunar month approx from solar month
  const maah=(date.getMonth()+ (tithiNum<15?0:0))%12;
  const ritu=Math.floor(((date.getMonth())/2))%6;
  return {tithiNum,tithiInPaksha,paksha,nak,yoga,karan,vaar,maah,ritu};
}

// Sunrise/sunset approximation for India (lat ~23N) — simple model
function sunTimes(date){
  const day=Math.floor((date-new Date(date.getFullYear(),0,0))/86400000);
  const decl=23.45*Math.sin((360/365)*(day-81)*Math.PI/180);
  const lat=23.0;
  const ha=Math.acos(-Math.tan(lat*Math.PI/180)*Math.tan(decl*Math.PI/180))*180/Math.PI;
  const noon=12.15; // approx solar noon IST adjustment
  let sr=noon-ha/15, ss=noon+ha/15;
  return {sunrise:fmtTime(sr),sunset:fmtTime(ss),
          moonrise:fmtTime((sr+ (computePanchang(date).tithiNum*0.8))%24)};
}
function fmtTime(h){
  h=(h+24)%24;let hh=Math.floor(h);let mm=Math.floor((h-hh)*60);
  let ap=hh<12?"AM":"PM";let h12=hh%12||12;
  return `${h12}:${mm<10?'0':''}${mm} ${ap}`;
}
// Rahukaal etc by weekday (sequence index of 8 day-segments)
const RAHU_SEQ=[8,2,7,5,6,4,3]; // Sun..Sat (1-indexed segment)
const GULIK_SEQ=[7,6,5,4,3,2,1];
const YAM_SEQ=[5,4,3,2,1,7,6];
function periodFromSeq(date,seqIdx){
  const {sunrise,sunset}=sunTimesRaw(date);
  const dayLen=sunset-sunrise;const seg=dayLen/8;
  const start=sunrise+(seqIdx-1)*seg;const end=start+seg;
  return `${fmtTime(start)} – ${fmtTime(end)}`;
}
function sunTimesRaw(date){
  const day=Math.floor((date-new Date(date.getFullYear(),0,0))/86400000);
  const decl=23.45*Math.sin((360/365)*(day-81)*Math.PI/180);
  const lat=23.0;
  const ha=Math.acos(-Math.tan(lat*Math.PI/180)*Math.tan(decl*Math.PI/180))*180/Math.PI;
  const noon=12.15;return {sunrise:noon-ha/15,sunset:noon+ha/15};
}

/* ---------- 4. FESTIVALS (fixed + tithi based sample) ---------- */
const FESTIVALS={
  hi:{"1-26":"गणतंत्र दिवस","8-15":"स्वतंत्रता दिवस","10-2":"गांधी जयंती"},
  en:{"1-26":"Republic Day","8-15":"Independence Day","10-2":"Gandhi Jayanti"},
  default:{"1-26":"गणतंत्र दिवस","8-15":"स्वतंत्रता दिवस","10-2":"गांधी जयंती"}
};
function festOf(date,lang){
  const key=(date.getMonth()+1)+"-"+date.getDate();
  const f=FESTIVALS[lang]||FESTIVALS.default;return f[key]||"";
}

/* ---------- 7. APP STATE & RENDERING ---------- */
let currentLang="hi";
let calDate=new Date();

function t(key){return I18N[currentLang][key]||I18N.hi[key];}

function buildLangBar(){
  const bar=document.getElementById("langBar");bar.innerHTML="";
  Object.keys(I18N).forEach(code=>{
    const b=document.createElement("button");
    b.textContent=I18N[code].name;b.dataset.lang=code;
    if(code===currentLang)b.classList.add("active");
    b.onclick=()=>{currentLang=code;document.documentElement.lang=code;renderAll();};
    bar.appendChild(b);
  });
}

function buildNav(){
  const nav=document.getElementById("mainNav");nav.innerHTML="";
  const items=[["daily","page-daily"],["monthly","page-monthly"],["hindu","page-hindu"],["mantra","page-mantra"]];
  items.forEach(([key,page],i)=>{
    const b=document.createElement("button");
    b.textContent=I18N[currentLang].nav[key];
    if(i===0)b.classList.add("active");
    b.onclick=()=>showPage(page,b);
    nav.appendChild(b);
  });
}
function showPage(id,btn){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  document.querySelectorAll("#mainNav button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

function item(label,value){
  return `<div class="pitem"><div class="label">${label}</div><div class="value">${value}</div></div>`;
}

function renderDaily(){
  const lang=currentLang;const L=I18N[lang].labels;
  const now=new Date();
  const p=computePanchang(now);
  const st=sunTimes(now);
  const vaarName=pick(VAAR,lang)[p.vaar];
  document.getElementById("todayDate").textContent=
    now.toLocaleDateString(lang==="en"?"en-IN":"hi-IN",{day:"numeric",month:"long",year:"numeric"})+" • "+vaarName;
  const grid=document.getElementById("dailyGrid");
  grid.innerHTML=
    item(L.tithi,pick(PAKSHA,lang)[p.paksha]+" "+pick(TITHI,lang)[p.tithiInPaksha])+
    item(L.vaar,vaarName)+
    item(L.nakshatra,pick(NAKSHATRA,lang)[p.nak])+
    item(L.yoga,pick(YOGA,lang)[p.yoga])+
    item(L.karan,pick(KARAN,lang)[p.karan])+
    item(L.paksha,pick(PAKSHA,lang)[p.paksha])+
    item(L.maah,pick(MAAH,lang)[p.maah])+
    item(L.ritu,pick(RITU,lang)[p.ritu])+
    item(L.samvat,(now.getFullYear()+57))+
    item(L.sunrise,st.sunrise)+
    item(L.sunset,st.sunset)+
    item(L.moonrise,st.moonrise);
  const m=document.getElementById("muhuratGrid");
  m.innerHTML=
    item(L.rahukaal,periodFromSeq(now,RAHU_SEQ[p.vaar]))+
    item(L.gulika,periodFromSeq(now,GULIK_SEQ[p.vaar]))+
    item(L.yamghant,periodFromSeq(now,YAM_SEQ[p.vaar]))+
    item(L.abhijit,"11:48 AM – 12:36 PM")+
    item(L.amrit,"05:30 AM – 07:00 AM");
}

function renderCalendar(){
  const lang=currentLang;
  const y=calDate.getFullYear(),mo=calDate.getMonth();
  const monthName=calDate.toLocaleDateString(lang==="en"?"en-IN":"hi-IN",{month:"long",year:"numeric"});
  document.getElementById("calTitle").textContent=monthName;
  const cal=document.getElementById("calendar");cal.innerHTML="";
  const dayNames=lang==="en"?["S","M","T","W","T","F","S"]:["र","सो","मं","बु","गु","शु","श"];
  dayNames.forEach(d=>{const e=document.createElement("div");e.className="cal-day-name";e.textContent=d;cal.appendChild(e);});
  const first=new Date(y,mo,1).getDay();
  const daysInMonth=new Date(y,mo+1,0).getDate();
  for(let i=0;i<first;i++){const e=document.createElement("div");e.className="cal-cell empty";cal.appendChild(e);}
  const today=new Date();
  for(let d=1;d<=daysInMonth;d++){
    const cell=document.createElement("div");cell.className="cal-cell";
    const cellDate=new Date(y,mo,d);
    const p=computePanchang(cellDate);
    const fest=festOf(cellDate,lang);
    if(d===today.getDate()&&mo===today.getMonth()&&y===today.getFullYear())cell.classList.add("today");
    cell.innerHTML=`<div class="num">${d}</div>
      <div class="tithi">${pick(TITHI,lang)[p.tithiInPaksha]}</div>
      ${fest?`<div class="fest">${fest}</div>`:""}`;
    cell.onclick=()=>showDayDetail(cellDate);
    cal.appendChild(cell);
  }
}
function changeMonth(delta){calDate.setMonth(calDate.getMonth()+delta);renderCalendar();}
function showDayDetail(date){
  const lang=currentLang;const L=I18N[lang].labels;
  const p=computePanchang(date);const st=sunTimes(date);
  document.getElementById("dayDetailCard").style.display="block";
  document.getElementById("dayDetailGrid").innerHTML=
    item("📆",date.toLocaleDateString(lang==="en"?"en-IN":"hi-IN",{day:"numeric",month:"long",year:"numeric"}))+
    item(L.vaar,pick(VAAR,lang)[p.vaar])+
    item(L.tithi,pick(PAKSHA,lang)[p.paksha]+" "+pick(TITHI,lang)[p.tithiInPaksha])+
    item(L.nakshatra,pick(NAKSHATRA,lang)[p.nak])+
    item(L.yoga,pick(YOGA,lang)[p.yoga])+
    item(L.karan,pick(KARAN,lang)[p.karan])+
    item(L.sunrise,st.sunrise)+
    item(L.sunset,st.sunset);
  document.getElementById("dayDetailCard").scrollIntoView({behavior:"smooth"});
}

function renderHindu(){
  const lang=currentLang;
  const data=HINDU_INFO[lang]||HINDU_INFO.hi;
  const c=document.getElementById("hinduContent");c.innerHTML="";
  data.forEach(x=>{
    c.innerHTML+=`<div class="mantra"><div class="title">${x.t}</div><div class="meaning">${x.d}</div></div>`;
  });
}

function renderMantra(){
  const lang=currentLang;
  const c=document.getElementById("mantraContent");c.innerHTML="";
  MANTRAS.forEach(m=>{
    const title=m.title[lang]||m.title.default;
    const meaning=m.meaning[lang]||m.meaning.default;
    c.innerHTML+=`<div class="mantra">
      <div class="title">${title}</div>
      <div class="sanskrit">${m.sanskrit}</div>
      <div class="meaning">${meaning}</div></div>`;
  });
}

function applyI18nText(){
  document.getElementById("siteTitle").textContent=I18N[currentLang].site;
  document.querySelectorAll("[data-i18n]").forEach(el=>{
    const key=el.dataset.i18n;if(I18N[currentLang][key])el.textContent=I18N[currentLang][key];
  });
}

function renderAll(){
  buildLangBar();buildNav();applyI18nText();
  renderDaily();renderCalendar();renderHindu();renderMantra();
  document.getElementById("dayDetailCard").style.display="none";
}

/* ---------- INIT ---------- */
renderAll();
</script>
