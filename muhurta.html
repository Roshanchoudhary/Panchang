<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">

<title>मुहूर्त | Muhurta</title>

<link rel="stylesheet" href="css/styles.css">

<style>
.loading{
    max-width:900px;
    margin:40px auto;
    text-align:center;
    color:#c1272d;
    font-size:18px;
}

.muhurta-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
    gap:18px;
    padding:20px;
}

.muhurta-card{
    background:#fff;
    border-radius:16px;
    padding:20px 15px;
    text-align:center;
    cursor:pointer;
    transition:.25s;
    box-shadow:0 4px 14px rgba(0,0,0,.12);
    border-top:5px solid #f7931e;
}

.muhurta-card:hover{
    transform:translateY(-5px);
}

.muhurta-card .icon{
    font-size:40px;
    margin-bottom:10px;
}

.muhurta-card h3{
    color:#c1272d;
    font-size:20px;
    margin-bottom:6px;
}

.muhurta-card p{
    color:#666;
    font-size:14px;
}

@media(max-width:700px){

.muhurta-grid{
grid-template-columns:repeat(2,1fr);
gap:12px;
padding:15px;
}

.muhurta-card h3{
font-size:17px;
}

.muhurta-card .icon{
font-size:34px;
}

}

</style>

</head>

<body>

<div id="chrome"></div>

<div id="content">

<div class="loading">

</div>

</div>
