<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🪔 मुहूर्त - Panchang.org.in</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕉️</text></svg>">
</head>
<body>
    <header>
        <div class="container">
            <a href="index.html" class="logo">🕉️ <span>Panchang</span>.org</a>
            <button class="menu-toggle" onclick="document.querySelector('nav').classList.toggle('open')">☰</button>
            <nav>
                <a href="index.html">🏠 होम</a>
                <a href="daily.html">📅 दैनिक</a>
                <a href="monthly.html">📆 मासिक</a>
                <a href="muhurt.html" class="active">🪔 मुहूर्त</a>
                <a href="katha.html">📖 कथा</a>
                <a href="login.html" id="loginLink">🔑 लॉगिन</a>
                <span id="userDisplay" style="color:var(--secondary);font-weight:700;margin-left:6px;"></span>
            </nav>
        </div>
    </header>

    <div class="hero">
        <div class="container">
            <h2>🪔 शुभ मुहूर्त</h2>
            <p>विवाह, यज्ञोपवीत, गृहप्रवेश, नामकरण आदि के लिए शुभ समय</p>
            <div class="city-badge">📍 दिल्ली, भारत</div>
        </div>
    </div>

    <section>
        <div class="container">
            <h2 class="section-title">🪔 आज के शुभ मुहूर्त <small id="muhurtDate"></small></h2>
            <div class="muhurt-list" id="muhurtList"></div>
        </div>
    </section>

    <footer>
        <div class="container">
            <div class="social">
                <a href="#" title="Facebook">📘</a>
                <a href="#" title="YouTube">▶️</a>
                <a href="#" title="Instagram">📸</a>
            </div>
            <div class="copy">© 2026 Panchang.org.in | 🙏 सभी धर्मों का सम्मान</div>
        </div>
    </footer>

    <script src="js/panchang.js"></script>
    <script src="js/geolocation.js"></script>
    <script src="js/auth.js"></script>
    <script>
        const today = new Date();
        document.getElementById('muhurtDate').textContent = today.toLocaleDateString('hi-IN', { 
            timeZone: 'Asia/Kolkata', year:'numeric', month:'long', day:'numeric' 
        });

        // मुहूर्त डेटा (वास्तविक गणना के लिए और कोड चाहिए, यहाँ उदाहरण)
        const muhurts = [
            { name: 'विवाह मुहूर्त', time: '11:30 - 13:15', desc: 'शुभ योग, गुरुवार' },
            { name: 'यज्ञोपवीत (जनेऊ)', time: '06:30 - 08:00', desc: 'ब्रह्म मुहूर्त' },
            { name: 'गृह प्रवेश', time: '09:15 - 10:45', desc: 'अभिजीत मुहूर्त' },
            { name: 'नामकरण', time: '16:00 - 17:30', desc: 'सायंकाल शुभ' },
            { name: 'वाहन क्रय', time: '11:00 - 12:30', desc: 'रवि योग' }
        ];

        let html = '';
        muhurts.forEach(m => {
            html += `
                <div class="muhurt-card">
                    <h4>${m.name}</h4>
                    <div class="time">🕐 ${m.time}</div>
                    <div style="font-size:0.9rem;color:var(--text-muted);">${m.desc}</div>
                </div>
            `;
        });
        document.getElementById('muhurtList').innerHTML = html;
    </script>
</body>
</html>
