<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📆 मासिक पंचांग - Panchang.org.in</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕉️</text></svg>">
</head>
<body>
    <header>
        <div class="container">
            <a href="index.html" class="logo">🕉️ <span>Panchang</span>.org</a>
            <button class="menu-toggle" onclick="document.querySelector('nav').classList.toggle('open')">☰</button>
            <nav>
                <a href="index.html">🏠 होम</a>
                <a href="daily.html">📅 दैनिक</a>
                <a href="monthly.html" class="active">📆 मासिक</a>
                <a href="muhurt.html">🪔 मुहूर्त</a>
                <a href="katha.html">📖 कथा</a>
                <a href="login.html" id="loginLink">🔑 लॉगिन</a>
                <span id="userDisplay" style="color:var(--secondary);font-weight:700;margin-left:6px;"></span>
            </nav>
        </div>
    </header>

    <div class="hero">
        <div class="container">
            <h2>📆 मासिक पंचांग</h2>
            <p>पूरे महीने की तिथियाँ, नक्षत्र और विशेष दिन</p>
            <div class="city-badge">📍 दिल्ली, भारत</div>
        </div>
    </div>

    <section>
        <div class="container">
            <h2 class="section-title">📆 <span id="monthlyTitle">लोड हो रहा...</span></h2>
            <div class="monthly-grid" id="monthlyGrid"></div>
        </div>
    </section>

    <footer>
        <div class="container">
            <div class="social">
                <a href="#" title="Facebook">📘</a>
                <a href="#" title="YouTube">▶️</a>
                <a href="#" title="Instagram">📸</a>
            </div>
            <div class="copy">© 2026 Panchang.org.in | 🙏 सभी धर्मों का सम्मान</div>
        </div>
    </footer>

    <script src="js/panchang.js"></script>
    <script src="js/geolocation.js"></script>
    <script src="js/auth.js"></script>
    <script>
        const today = new Date();
        const year = today.getFullYear();
        const month = today.getMonth();
        const todayDate = today.getDate();

        document.getElementById('monthlyTitle').textContent = today.toLocaleDateString('hi-IN', { 
            timeZone: 'Asia/Kolkata', month:'long', year:'numeric' 
        });

        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const dayNames = ['रवि', 'सोम', 'मंगल', 'बुध', 'गुरु', 'शुक्र', 'शनि'];

        let html = '';
        for (let i = 0; i < 7; i++) {
            html += `<div class="day-name">${dayNames[i]}</div>`;
        }
        for (let i = 0; i < firstDay; i++) {
            html += `<div class="day-cell empty"></div>`;
        }

        for (let d = 1; d <= daysInMonth; d++) {
            const pan = Panchang.getPanchang(year, month, d);
            const isToday = (d === todayDate) ? 'today' : '';
            const tithiShort = pan.tithi.substring(0, 4);
            html += `<div class="day-cell ${isToday}">${d}<span class="tithi-sm">${tithiShort}</span></div>`;
        }
        document.getElementById('monthlyGrid').innerHTML = html;
    </script>
</body>
</html>
